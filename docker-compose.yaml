services:
  api:
    build: .
    container_name: shortener-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      # redis:
      #   condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17
    container_name: shortener_postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
      
  # redis:
  #   image: redis:7-alpine
  #   container_name: shortener_redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data

  #   healthcheck:
  #     test: ["CMD", "redis_cli", "ping"]
